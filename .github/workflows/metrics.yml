name: Generate metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Main metrics (terminal template)
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: tincke10
          filename: metrics.svg
          template: terminal
          base: header, activity, community, repositories, metadata
          config_timezone: America/Argentina/Buenos_Aires
          config_padding: 0, 6px

      - name: Languages plugin
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: tincke10
          filename: metrics-languages.svg
          base: ""
          plugin_languages: yes
          plugin_languages_ignored: html, css, scss, dockerfile, makefile
          plugin_languages_details: bytes-size, percentage
          plugin_languages_indepth: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_sections: most-used

      - name: Activity & isometric calendar
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: tincke10
          filename: metrics-calendar.svg
          base: ""
          config_timezone: America/Argentina/Buenos_Aires
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
